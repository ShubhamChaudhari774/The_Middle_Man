<!DOCTYPE html>
<html>
    <head>
        <title>The Middlemen</title>
    </head>
    <body>
        <!-- This is the menubar at the top of the page -->
        <div id="menubar">
            <a id="homelink" href="{% url 'home' %}">Home</a>
            {% if user.is_authenticated %}
            <a id="profilelink" href="{% url 'profile' %}">Profile</a>
            <a id="messageslink" href="{% url 'messages' %}">Messages</a>
            <a id="browselink" href="{% url 'browse' %}">Browse</a>
            <a id="searchlink" href="{% url 'search' %}">Search</a>
            <a id="logoutlink" href="{% url 'logout' %}">Logout</a>
            {% else %}
            <a id="loginlink" href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>

        <!-- This will be filled in by page specific content -->
        <div id="content">
        {% block content %}
        
        {% endblock %}
        </div>
    </body>
</html>
